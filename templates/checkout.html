{% extends "base.html" %}

{% block title %}Checkout — DRIP{% endblock %}

{% block content %}
<div class="checkout-wrap">
  <h2 class="checkout-title">Checkout</h2>

  {% if error %}
  <div class="form-error-banner">{{ error }}</div>
  {% endif %}

  <div class="checkout-summary" id="checkout-summary"></div>

  <form class="checkout-form" id="checkout-form" method="post" action="/checkout" novalidate>
    <input type="hidden" name="items_json" id="items_json" value="{{ items_json }}">

    <div class="form-field">
      <label class="form-label" for="customer_name">Full Name</label>
      <input class="form-input" type="text" id="customer_name" name="customer_name"
             value="{{ customer_name or '' }}" placeholder="Your full name"
             required autocomplete="name">
    </div>

    <div class="form-field">
      <label class="form-label" for="phone">Mobile Number</label>
      <div class="form-input-group">
        <span class="form-prefix">+91</span>
        <input class="form-input form-input--joined" type="tel" id="phone" name="phone"
               value="{{ phone or '' }}" placeholder="10-digit number"
               maxlength="10" inputmode="numeric" required autocomplete="tel-national">
      </div>
      <span class="form-hint" id="phone-hint"></span>
    </div>

    <div class="form-field">
      <label class="form-label" for="address">Delivery Address</label>
      <textarea class="form-input form-textarea" id="address" name="address"
                placeholder="House no., Street, Area, Landmark" required rows="3"
                >{{ address or '' }}</textarea>
    </div>

    <div class="checkout-total" id="checkout-total"></div>

    <button type="submit" class="btn--whatsapp checkout-submit">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.528 5.845L.057 23.633a.75.75 0 0 0 .92.92l5.788-1.471A11.944 11.944 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.699 9.699 0 0 1-4.951-1.354l-.355-.21-3.676.933.95-3.573-.23-.368A9.699 9.699 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>
      </svg>
      Place Order on WhatsApp
    </button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  function fmt(n) {
    return "₹" + n.toLocaleString("en-IN");
  }

  const items = Cart.get();
  const hiddenField = document.getElementById("items_json");

  if (items.length === 0 && !hiddenField.value) {
    window.location.replace("/cart");
  }

  if (!hiddenField.value) {
    hiddenField.value = JSON.stringify(items);
  }

  // Render order summary from localStorage
  const summaryEl = document.getElementById("checkout-summary");
  summaryEl.innerHTML = items.map(item => {
    const meta = (item.size ? `Size: ${item.size}` : "One size") + ` ×${item.qty}`;
    return `
      <div class="co-item">
        <span class="co-item__name">${item.name}<span class="co-item__meta">${meta}</span></span>
        <span class="co-item__price">${fmt(item.price * item.qty)}</span>
      </div>`;
  }).join("") + `<div class="co-free-del">Free delivery</div>`;

  document.getElementById("checkout-total").innerHTML =
    `<span>Total</span><span>${fmt(Cart.total())}</span>`;

  // Phone: strip non-digits, show live hint
  const phoneInput = document.getElementById("phone");
  const phoneHint = document.getElementById("phone-hint");

  phoneInput.addEventListener("input", () => {
    phoneInput.value = phoneInput.value.replace(/\D/g, "").slice(0, 10);
    const v = phoneInput.value;
    if (v.length > 0 && !/^[6-9]/.test(v)) {
      phoneHint.textContent = "Must start with 6, 7, 8, or 9";
      phoneHint.className = "form-hint form-hint--err";
    } else if (v.length === 10) {
      phoneHint.textContent = "";
    } else {
      phoneHint.textContent = "";
    }
  });

  document.getElementById("checkout-form").addEventListener("submit", e => {
    const v = phoneInput.value.trim();
    if (!/^[6-9]\d{9}$/.test(v)) {
      e.preventDefault();
      phoneHint.textContent = "Enter a valid 10-digit number starting with 6–9";
      phoneHint.className = "form-hint form-hint--err";
      phoneInput.focus();
    }
  });
</script>
{% endblock %}
