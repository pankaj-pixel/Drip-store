<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DRIP{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}DRIP — Men's clothing store in Delhi. Shop kurtas, jeans, shirts, jerseys and more. Free delivery across Delhi.{% endblock %}">
  <meta name="keywords" content="{% block meta_keywords %}men's clothing delhi, kurta, jeans, jersey, free delivery delhi{% endblock %}">
  <meta property="og:title" content="{% block og_title %}DRIP — Men's Clothing Delhi{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Men's clothing store in Delhi. Free delivery across all of Delhi.{% endblock %}">
  <meta property="og:type" content="website">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav__logo">DRIP</a>
    <a href="tel:08826662645" class="nav__phone" aria-label="Call us">
      <span class="nav__phone-icon">📞</span>
      <span class="nav__phone-num">088266 62645</span>
    </a>
    <a href="/cart" class="nav__cart" aria-label="Cart">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge" id="cart-badge"></span>
    </a>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Free delivery · All Delhi</p>
    <p>Orders via WhatsApp</p>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
