{% extends "base.html" %}

{% block title %}Cart — DRIP{% endblock %}

{% block content %}
<div class="cart-page">
  <h2 class="cart-title">Cart</h2>
  <div id="cart-items"></div>
  <div class="cart-empty" id="cart-empty" style="display:none">
    <p>Your cart is empty.</p>
    <a href="/" class="btn btn--primary cart-empty__btn">Browse Products</a>
  </div>
</div>

<div class="cart-footer" id="cart-footer" style="display:none">
  <div class="cart-total">
    <span>Total</span>
    <span id="cart-total-val"></span>
  </div>
  <button class="btn--whatsapp" id="cart-whatsapp-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15

    Order on WhatsApp
  </button>
</div>
{% endblock %}

{% block scripts %}
<script>
  function fmt(n) {
    return "₹" + n.toLocaleString("en-IN");
  }

  function renderCart() {
    const items = Cart.get();
    const container = document.getElementById("cart-items");
    const empty = document.getElementById("cart-empty");
    const footer = document.getElementById("cart-footer");

    if (items.length === 0) {
      container.innerHTML = "";
      empty.style.display = "block";
      footer.style.display = "none";
      return;
    }

    empty.style.display = "none";
    footer.style.display = "block";

    container.innerHTML = items.map(item => {
      const lineTotal = item.price * item.qty;
      const sizeLabel = item.size ? `Size: ${item.size}` : "One size";
      return `
        <div class="cart-item">
          <img class="cart-item__img" src="/static/uploads/${item.image}" alt="${item.name}" onerror="this.style.visibility='hidden'">
          <div class="cart-item__info">
            <div class="cart-item__name">${item.name}</div>
            <div class="cart-item__size">${sizeLabel}</div>
            <div class="cart-item__bottom">
              <div class="cart-item__qty">
                <button class="qty-btn" onclick="changeQty('${item.key}', -1)">−</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="changeQty('${item.key}', 1)">+</button>
              </div>
              <span class="cart-item__price">${fmt(lineTotal)}</span>
            </div>
          </div>
          <button class="cart-item__remove" onclick="removeItem('${item.key}')" aria-label="Remove">✕</button>
        </div>
      `;
    }).join("");

    document.getElementById("cart-total-val").textContent = fmt(Cart.total());
  }

  function changeQty(key, delta) {
    Cart.updateQty(key, delta);
    renderCart();
  }

  function removeItem(key) {
    Cart.remove(key);
    renderCart();
  }

  document.getElementById("cart-whatsapp-btn").addEventListener("click", () => {
    if (Cart.get().length === 0) return;
    window.location.href = "/checkout";
  });

  renderCart();
</script>
{% endblock %}
